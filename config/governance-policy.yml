  # Optional: narrow to repos carrying an org custom property. Commented out so the
  # explicit `repos` list above is the sole scope. Re-enable to additionally require the
  # property (a repo would then need to be in the list AND carry the property).
  # customProperty:
  #   name: team
  #   value: infodevops

# GitHub Actions policy — desired settings at org and repo level.
actions:
  # all | local_only | selected
  allowedActions: selected
  # When allowedActions == selected, the following must hold:
  githubOwnedAllowed: true
  verifiedAllowed: true
  patternsAllowed:
    - HSLdevcom/*
  # read | write — default GITHUB_TOKEN permissions granted to workflows.
  defaultWorkflowPermissions: read
  # Whether Actions can approve pull request reviews. Should be false.
  canApprovePullRequestReviews: false

# Team & collaborator permissions.
teams:
  # Teams that must be granted the given role on every in-scope repo.
  # permission: pull | triage | push | maintain | admin
  required:
    - slug: infodevops-team
      permission: admin
  # If false, any directly-added (non-team) collaborator is reported as drift.
  allowDirectCollaborators: false

# HSL-specific compliance checks (audit-only; remediation is manual).
compliance:
  sharedWorkflows:
    workflowFile: .github/workflows/ci-cd.yml
    legacyFile: .github/workflows/test-and-build.yml
    requiredRef: HSLdevcom/transitdata-shared-workflows
  dockerBaseImage:
    # Files to inspect for FROM lines. Missing files are treated as "not containerized".
    dockerfilePaths:
      - Dockerfile
    requiredBaseImageRepo: hsldevcom/infodevops-docker-base-images
    forbiddenBaseImages:
      - eclipse-temurin:11-alpine
      - eclipse-temurin:11
