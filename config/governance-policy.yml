# Desired state for the custom compliance audit (scripts/governance-audit).
#
# This file covers the ~20% of governance the marketplace action does NOT handle:
# GitHub Actions policies, team/collaborator permissions, and HSL-specific compliance
# (shared-workflows migration, Docker base images).
#
# Iteration 1 is AUDIT-ONLY: the script reads this file and reports drift. It never writes.

org: HSLdevcom

# Which repositories the audit runs against.
scope:
  excludeArchived: true
  excludeForks: true
  # Explicit allowlist — the audit runs ONLY against these repos. Accepts short name
  # ("mqtt-pulsar-gateway") or full name ("HSLdevcom/mqtt-pulsar-gateway").
  # excludeArchived/excludeForks still apply on top. Sourced from the team-infodevops
  # team's repositories (2026-06-26).
  repos:
    - HSLdevcom/ajoaikadata
    - HSLdevcom/digitransit-site
    - HSLdevcom/eke-mqtt-api-spec
    - HSLdevcom/gtfsrt2hfp
    - HSLdevcom/helmet-ui
